version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jobplatform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.go
      args:
        SERVICE_PATH: apps/api
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - PORT=8080
      - DATABASE_URL=host=postgres user=postgres password=password dbname=jobplatform port=5432 sslmode=disable
      - REDIS_URL=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.go
      args:
        SERVICE_PATH: services/worker
    environment:
      - APP_ENV=production
      - DATABASE_URL=host=postgres user=postgres password=password dbname=jobplatform port=5432 sslmode=disable
      - REDIS_URL=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.go
      args:
        SERVICE_PATH: services/scheduler
    environment:
      - APP_ENV=production
      - DATABASE_URL=host=postgres user=postgres password=password dbname=jobplatform port=5432 sslmode=disable
      - REDIS_URL=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dashboard
    ports:
      - "3001:3000" # Expose UI on 3001
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
